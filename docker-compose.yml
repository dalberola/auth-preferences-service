services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # Both optional; later file wins, so .env.local overrides .env.
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      # Overrides point the app at the compose-network services regardless of .env.
      MONGODB_URI: mongodb://mongo:27017/auth_preferences
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
      # Anonymous volume keeps the container's built node_modules (incl. native argon2).
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      mailpit:
        condition: service_started

  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025" # web UI: http://localhost:8025
      - "1025:1025" # SMTP

volumes:
  mongo_data:
