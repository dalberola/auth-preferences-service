services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # Both optional; later file wins, so .env.local overrides .env.
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      # Overrides point the app at the compose-network services regardless of .env.
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: auth_preferences
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
      # Anonymous volume keeps the container's built node_modules (incl. native argon2).
      - /app/node_modules
    depends_on:
      mariadb:
        condition: service_healthy
      mailpit:
        condition: service_started

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: auth_preferences
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025" # web UI: http://localhost:8025
      - "1025:1025" # SMTP

volumes:
  mariadb_data:
