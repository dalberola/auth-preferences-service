# Exercises the production image locally. NOT a deployment manifest.
#
# NODE_ENV=production disables TypeORM schema auto-sync; the app runs pending
# migrations automatically on startup instead (migrationsRun), so the schema is
# created on first boot against an empty database. Real deployments supply their
# own managed MariaDB and SMTP via environment; the bundled mariadb/mailpit here
# exist only to run the image end-to-end on a laptop.
#
#   docker compose -f compose.prod.yml up --build
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # JWT secrets (and any SMTP creds) come from .env.local; later file wins.
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: auth_preferences
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    ports:
      - "4000:4000"
    depends_on:
      mariadb:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: auth_preferences
    volumes:
      - mariadb_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025" # web UI: http://localhost:8025
      - "1025:1025" # SMTP

volumes:
  mariadb_prod_data:
